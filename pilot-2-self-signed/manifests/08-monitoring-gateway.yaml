# Gateway + HTTPRoutes exposing kiali over HTTPS (with HTTP->HTTPS redirect).
# CHANGE every hostname below to your own domain.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: monitoring-gateway
  namespace: istio-system
spec:
  gatewayClassName: istio
  listeners:
  - name: https-kiali
    hostname: "kiali.n2.nested.sclabs.cloud"   # domain from BASE_DOMAIN (env.sh), rendered by step3
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: kiali-tls
    allowedRoutes:
      namespaces:
        from: Same
  - name: http-kiali
    hostname: "kiali.n2.nested.sclabs.cloud"   # domain from BASE_DOMAIN (env.sh), rendered by step3
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
# Serve kiali over HTTPS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
spec:
  parentRefs:
  - name: monitoring-gateway
    sectionName: https-kiali
  hostnames:
  - "kiali.n2.nested.sclabs.cloud"             # domain from BASE_DOMAIN (env.sh), rendered by step3
  rules:
  - backendRefs:
    - name: kiali
      port: 20001
---
# HTTP -> HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali-redirect
  namespace: istio-system
spec:
  parentRefs:
  - name: monitoring-gateway
    sectionName: http-kiali
  hostnames:
  - "kiali.n2.nested.sclabs.cloud"             # domain from BASE_DOMAIN (env.sh), rendered by step3
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
